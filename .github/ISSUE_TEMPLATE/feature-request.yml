name: Feature Request
description: Suggest a feature for SkyStratos
title: "[Feature]: "
labels: ["enhancement", "needs-review"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? What use case does it address?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Fleet Tracking
        - Maintenance
        - Procurement / Inventory
        - Cost Analysis
        - Tower AI
        - Aviation Features (MEL, AD/SB, Dispatch)
        - UI / Design System
        - Data / Integrations
        - Other
